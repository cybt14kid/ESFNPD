version: '3.8'

services:
  esfnpe:
    build: .
    container_name: esfnpe
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/"]
      interval: 30s
      timeout: 10s
      retries: 3
