version: '3.8'

services:
  esfnd:
    build: .
    container_name: esfnd
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - quiz-data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3030/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  quiz-data:
