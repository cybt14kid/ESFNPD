<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320">
  <rect width="580" height="320" fill="#f5f5f5"/>
  <text x="290" y="25" text-anchor="middle" font-size="14" font-weight="bold">OSPF多区域网络设计</text>
  
  <!-- Area 0 -->
  <rect x="220" y="50" width="140" height="100" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2" rx="8" stroke-dasharray="6,3"/>
  <text x="290" y="70" text-anchor="middle" font-size="11" fill="#4a90d9" font-weight="bold">Area 0 (Backbone)</text>
  
  <!-- Router0 (ABR) -->
  <rect x="115" y="80" width="60" height="40" fill="#9b59b6" rx="5"/>
  <text x="145" y="100" text-anchor="middle" fill="white" font-size="10">R1 (ABR)</text>
  <text x="145" y="112" text-anchor="middle" fill="#aaa" font-size="8">192.168.0.1</text>
  
  <!-- Router1 (ABR) -->
  <rect x="405" y="80" width="60" height="40" fill="#9b59b6" rx="5"/>
  <text x="435" y="100" text-anchor="middle" fill="white" font-size="10">R2 (ABR)</text>
  <text x="435" y="112" text-anchor="middle" fill="#aaa" font-size="8">192.168.0.2</text>
  
  <!-- Router2 (Internal) -->
  <rect x="115" y="170" width="60" height="40" fill="#27ae60" rx="5"/>
  <text x="145" y="190" text-anchor="middle" fill="white" font-size="10">R3</text>
  <text x="145" y="202" text-anchor="middle" fill="#aaa" font-size="8">192.168.1.1</text>
  
  <!-- Router3 (Internal) -->
  <rect x="405" y="170" width="60" height="40" fill="#27ae60" rx="5"/>
  <text x="435" y="190" text-anchor="middle" fill="white" font-size="10">R4</text>
  <text x="435" y="202" text-anchor="middle" fill="#aaa" font-size="8">192.168.2.1</text>
  
  <!-- Router4 (Internal) -->
  <rect x="260" y="170" width="60" height="40" fill="#27ae60" rx="5"/>
  <text x="290" y="190" text-anchor="middle" fill="white" font-size="10">R5</text>
  <text x="290" y="202" text-anchor="middle" fill="#aaa" font-size="8">192.168.3.1</text>
  
  <!-- Area 1 -->
  <rect x="30" y="155" width="200" height="70" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8" stroke-dasharray="6,3"/>
  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#f39c12" font-weight="bold">Area 1</text>
  
  <!-- Area 2 -->
  <rect x="350" y="155" width="200" height="70" fill="#f9ebea" stroke="#e74c3c" stroke-width="2" rx="8" stroke-dasharray="6,3"/>
  <text x="450" y="175" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Area 2</text>
  
  <!-- 连线 -->
  <line x1="175" y1="100" x2="220" y2="90" stroke="#333" stroke-width="2"/>
  <line x1="360" y1="90" x2="405" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="145" y1="120" x2="145" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="435" y1="120" x2="435" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="290" y1="150" x2="290" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="110" x2="290" y2="150" stroke="#333" stroke-width="2"/>
  <line x1="360" y1="110" x2="290" y2="150" stroke="#333" stroke-width="2"/>
  
  <!-- Cost标注 -->
  <text x="197" y="88" font-size="9" fill="#666">Cost=10</text>
  <text x="315" y="88" font-size="9" fill="#666">Cost=10</text>
  
  <text x="290" y="300" text-anchor="middle" font-size="10" fill="#666">图5：OSPF多区域设计，R1和R2为ABR（区域边界路由器），Area 0为骨干区域</text>
</svg>
