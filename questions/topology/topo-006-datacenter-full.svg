<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400">
  <rect width="620" height="400" fill="#f5f5f5"/>
  <text x="310" y="25" text-anchor="middle" font-size="14" font-weight="bold">某中型企业数据中心网络拓扑</text>
  
  <!-- 互联网 -->
  <rect x="260" y="40" width="100" height="35" fill="#e74c3c" rx="5"/>
  <text x="310" y="62" text-anchor="middle" fill="white" font-size="11">Internet</text>
  
  <!-- 防火墙 -->
  <rect x="260" y="90" width="100" height="35" fill="#8e44ad" rx="5"/>
  <text x="310" y="112" text-anchor="middle" fill="white" font-size="11">Firewall</text>
  
  <!-- 核心层 -->
  <rect x="250" y="145" width="120" height="40" fill="#4a90d9" rx="5"/>
  <text x="310" y="165" text-anchor="middle" fill="white" font-size="11">Core Switch</text>
  <text x="310" y="178" text-anchor="middle" fill="#aaa" font-size="9">10.0.0.1/24</text>
  
  <!-- 汇聚层 -->
  <rect x="120" y="205" width="90" height="40" fill="#e67e22" rx="5"/>
  <text x="165" y="225" text-anchor="middle" fill="white" font-size="10">Aggregation-1</text>
  <text x="165" y="238" text-anchor="middle" fill="#aaa" font-size="8">10.0.1.1/24</text>
  
  <rect x="410" y="205" width="90" height="40" fill="#e67e22" rx="5"/>
  <text x="455" y="225" text-anchor="middle" fill="white" font-size="10">Aggregation-2</text>
  <text x="455" y="238" text-anchor="middle" fill="#aaa" font-size="8">10.0.2.1/24</text>
  
  <!-- 服务器区 -->
  <rect x="30" y="280" width="80" height="35" fill="#27ae60" rx="3"/>
  <text x="70" y="301" text-anchor="middle" fill="white" font-size="10">Web Server</text>
  <text x="70" y="311" text-anchor="middle" fill="#aaa" font-size="8">VLAN10</text>
  
  <rect x="120" y="280" width="80" height="35" fill="#27ae60" rx="3"/>
  <text x="160" y="301" text-anchor="middle" fill="white" font-size="10">App Server</text>
  <text x="160" y="311" text-anchor="middle" fill="#aaa" font-size="8">VLAN20</text>
  
  <rect x="210" y="280" width="80" height="35" fill="#27ae60" rx="3"/>
  <text x="250" y="301" text-anchor="middle" fill="white" font-size="10">DB Server</text>
  <text x="250" y="311" text-anchor="middle" fill="#aaa" font-size="8">VLAN30</text>
  
  <!-- 存储网络 -->
  <rect x="330" y="280" width="80" height="35" fill="#16a085" rx="3"/>
  <text x="370" y="301" text-anchor="middle" fill="white" font-size="10">SAN Switch</text>
  <text x="370" y="311" text-anchor="middle" fill="#aaa" font-size="8">FC-SAN</text>
  
  <!-- 管理网络 -->
  <rect x="420" y="280" width="80" height="35" fill="#95a5a6" rx="3"/>
  <text x="460" y="301" text-anchor="middle" fill="white" font-size="10">Mgmt Port</text>
  <text x="460" y="311" text-anchor="middle" fill="#aaa" font-size="8">OOB</text>
  
  <!-- 备份区 -->
  <rect x="510" y="280" width="80" height="35" fill="#34495e" rx="3"/>
  <text x="550" y="301" text-anchor="middle" fill="white" font-size="10">Backup</text>
  <text x="550" y="311" text-anchor="middle" fill="#aaa" font-size="8">NAS</text>
  
  <!-- 连线 -->
  <line x1="310" y1="75" x2="310" y2="90" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="125" x2="310" y2="145" stroke="#333" stroke-width="2"/>
  <line x1="250" y1="165" x2="165" y2="205" stroke="#333" stroke-width="2"/>
  <line x1="370" y1="165" x2="455" y2="205" stroke="#333" stroke-width="2"/>
  <line x1="165" y1="245" x2="70" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="165" y1="245" x2="160" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="165" y1="245" x2="250" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="455" y1="245" x2="370" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="455" y1="245" x2="460" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="455" y1="245" x2="550" y2="280" stroke="#333" stroke-width="1.5"/>
  
  <!-- 汇聚层间横向链路 -->
  <line x1="210" y1="225" x2="410" y2="225" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="310" y="218" text-anchor="middle" font-size="9" fill="#c0392b">HSRP/VRRP冗余</text>
  
  <text x="310" y="390" text-anchor="middle" font-size="10" fill="#666">图6：企业数据中心典型三层架构，含服务器分区、存储网络和带外管理</text>
</svg>
